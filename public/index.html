<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrubHub + Postman v12 Demo</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="topNav">
    <div class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="#FF5501" stroke-width="2"/><text x="16" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#FF5501">G</text></svg>
      <span>GrubHub <span class="accent">&times;</span> Postman v12</span>
    </div>
    <div class="nav-tabs">
      <button class="tab active" data-tab="script">Demo Script</button>
      <button class="tab" data-tab="explorer">API Explorer</button>
      <button class="tab" data-tab="slides">Slides</button>
    </div>
    <div class="nav-status" id="serverStatus">
      <span class="status-dot"></span>
      <span class="status-text">Checking...</span>
    </div>
  </nav>

  <!-- DEMO SCRIPT TAB -->
  <section id="tab-script" class="tab-content active">
    <div class="script-container">
      <div class="script-controls">
        <button id="autoScrollBtn" class="btn btn-primary">Auto-Scroll</button>
        <div class="speed-control">
          <label>Speed</label>
          <input type="range" id="scrollSpeed" min="1" max="10" value="3">
        </div>
        <div class="script-help">Space = pause/resume &middot; &uarr;&darr; = manual scroll</div>
      </div>
      <div class="script-sidebar" id="scriptSidebar"></div>
      <div class="script-body" id="scriptBody"></div>
    </div>
  </section>

  <!-- API EXPLORER TAB -->
  <section id="tab-explorer" class="tab-content">
    <div class="explorer-layout">
      <div class="explorer-sidebar">
        <h3>Endpoints</h3>
        <div id="endpointList"></div>
      </div>
      <div class="explorer-main">
        <div class="request-panel" id="requestPanel">
          <div class="request-bar">
            <select id="reqMethod">
              <option>GET</option>
              <option>POST</option>
              <option>PUT</option>
              <option>DELETE</option>
            </select>
            <input type="text" id="reqUrl" placeholder="/api/v1/restaurants">
            <button id="sendBtn" class="btn btn-primary">Send</button>
          </div>
          <div class="request-config">
            <div class="config-section">
              <label>X-API-Key</label>
              <input type="text" id="reqApiKey" value="grubhub-demo-key-2026">
            </div>
            <div class="config-section">
              <label>Request Body (JSON)</label>
              <textarea id="reqBody" rows="6" placeholder="{}"></textarea>
            </div>
          </div>
        </div>
        <div class="response-panel" id="responsePanel">
          <div class="response-header">
            <span id="respStatus"></span>
            <span id="respTime"></span>
          </div>
          <pre id="respBody" class="response-body">Send a request to see the response.</pre>
        </div>
      </div>
    </div>
  </section>

  <!-- SLIDES TAB -->
  <section id="tab-slides" class="tab-content">
    <div class="slides-container" id="slidesContainer"></div>
    <div class="slides-nav">
      <button id="prevSlide" class="btn btn-ghost">&larr; Previous</button>
      <span id="slideIndicator">1 / 3</span>
      <button id="nextSlide" class="btn btn-ghost">Next &rarr;</button>
    </div>
  </section>

  <script src="/js/teleprompter.js"></script>
  <script src="/js/explorer.js"></script>
  <script src="/js/slides.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
