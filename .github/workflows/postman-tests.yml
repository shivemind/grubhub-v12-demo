name: Postman API Tests & Governance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        run: |
          npm start &
          sleep 3
        env:
          PORT: 3000
          API_KEY: grubhub-demo-key-2026

      - name: Verify API health
        run: |
          curl -sf http://localhost:3000/api/v1/health
          echo "API is healthy"

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Run Postman collection tests
        if: ${{ vars.POSTMAN_COLLECTION_ID != '' && vars.POSTMAN_ENVIRONMENT_ID != '' }}
        run: |
          postman collection run "$COLLECTION_ID" \
            --environment "$ENVIRONMENT_ID" \
            --bail
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          COLLECTION_ID: ${{ vars.POSTMAN_COLLECTION_ID }}
          ENVIRONMENT_ID: ${{ vars.POSTMAN_ENVIRONMENT_ID }}

  governance:
    name: API Governance Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Lint OpenAPI spec
        run: |
          postman api lint --api-definition spec/grubhub-partner-api.yaml
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}

      - name: Validate OpenAPI spec structure
        run: |
          npx @apidevtools/swagger-cli validate spec/grubhub-partner-api.yaml
          echo "OpenAPI spec is valid"

  onboard-to-postman:
    name: Onboard Spec to Postman
    runs-on: ubuntu-latest
    needs: [api-tests, governance]
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Convert spec to JSON
        run: node -e "const y=require('js-yaml');const f=require('fs');f.writeFileSync('spec/grubhub-partner-api.json',JSON.stringify(y.load(f.readFileSync('spec/grubhub-partner-api.yaml','utf8')),null,2))"

      - name: Push spec to Spec Hub and derive assets
        run: node scripts/onboard-to-postman.js
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ vars.POSTMAN_WORKSPACE_ID }}
